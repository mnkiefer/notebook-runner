name: Test action

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test_success:
    runs-on: [ ubuntu-latest ]
    steps:
    - uses: actions/checkout@v3
  
    - name: Test 'Hello world' CAP Notebook
      uses: mnkiefer/notebook-runner@main
      with:
        notebook-files: 'test/helloWorld.capnb'
        summary-on-success: true

  test_failure:
    runs-on: [ ubuntu-latest ]
    steps:
    - uses: actions/checkout@v3
  
    - name: Test broken 'Hello world' CAP Notebook
      uses: mnkiefer/notebook-runner@main
      with:
        notebook-files: 'test/helloWorld.failed.capnb'

    - name: Clean up
      if: success() || failure()
      run: |
        echo "Done"
