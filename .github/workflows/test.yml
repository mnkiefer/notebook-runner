name: Test action

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: [ ubuntu-latest ]
    steps:
    - uses: actions/checkout@v3
  
    - name: Test 'Hello world' CAP Notebook
      uses: mnkiefer/notebook-runner@main
      with:
        notebook-files: 'helloWorld/test.capnb'
        summary-on-success: true
        
    - name: Test broken 'Hello world' CAP Notebook
      uses: mnkiefer/notebook-runner@main
      with:
        notebook-files: 'test/helloWorld.failed.capnb'
