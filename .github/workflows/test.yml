name: Test action

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: [ ubuntu-latest ]
    steps:
    - uses: actions/checkout@v3
    - name: Checkout sample project
    
    - name: Install git
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install git -y      
  
    - name: Test CAP Notebooks
      if: ${{ hashFiles('./notebooks/*.capnb') != '' }}
      uses: mnkiefer/notebook-runner@main
      with:
        notebook-files: 'test/test.capnb'
